name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ats
          POSTGRES_PASSWORD: ats_password
          POSTGRES_DB: ats
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          
      - name: Set up database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ats:ats_password@localhost/ats
        run: |
          alembic upgrade head
          
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ats:ats_password@localhost/ats
        run: |
          pytest --tb=short -q