[pytest]
# Test discovery
testpaths = tests

# Asyncio mode — required for testing async FastAPI endpoints
asyncio_mode = auto

# Output verbosity
addopts = -v --tb=short

# Markers (register here to avoid warnings)
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (requires database or external services)
    db: Database tests (requires PostgreSQL with ATS schema applied)
    slow: Tests that take longer than 1 second
