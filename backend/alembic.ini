# Aegis Trading System — Alembic Configuration
#
# The database URL is NOT set here.
# It is read from DATABASE_URL (via app.core.config) inside env.py.
# This ensures consistency — the same config system used by the application
# is used by Alembic migrations.
#
# Usage:
#   cd backend
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# sqlalchemy.url is intentionally left commented out.
# env.py reads it from the application config (DATABASE_URL).
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S